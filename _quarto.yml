project:
  type: website
  execute-dir: project
  render: # Add HERE new chapters and new notebooks
    - index.qmd
    - chapters/rag_pipeline.qmd
    - notebooks/notebook1.qmd

website:
  page-navigation: true
  title: "Using LLMs for text classification"
  # In the two URLs below:
  # - replace AIML4OS by the Github account/organization your repository is hosted by;
  # - replace AIML4OS-template-quarto-python by the name of your repository.
  # If your repo is on the AIML4OS organization, change only the name of the repo.
  site-url: "https://aiml4os.github.io/WP10-Cluster2-RAG/"
  repo-url: "https://github.com/AIML4OS/WP10-cluster2-RAG/"
  repo-actions: [edit, source, issue]
  sidebar:
    search: true
    contents: # Add HERE new chapters (but not the notebooks)
      - href: index.qmd
        text: Introduction
      - href: chapters/rag_pipeline.qmd
        text: RAG pipeline

format:
  html:
    theme:
      - cosmo
    css: styles.css
    toc: true
    code-fold: true
  ipynb:
    output: true


filters:
  - export-metadata.lua

